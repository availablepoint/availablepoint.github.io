<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat App</title>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #111827;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
      background: #111827;
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 30;
    }

    .sidebar-overlay.active {
      display: block;
    }

    .sidebar {
      width: 16rem;
      background: #1f2937;
      border-right: 1px solid #374151;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 40;
    }

    .sidebar-header {
      padding: 1rem;
      border-bottom: 1px solid #374151;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-header h2 {
      font-size: 0.875rem;
      font-weight: 600;
    }

    .close-sidebar {
      display: none;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 0.5rem;
    }

    .sidebar-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .section {
      border-bottom: 1px solid #374151;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .section.flex-grow {
      flex: 1;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      color: #9ca3af;
    }

    .section-header button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0.25rem;
      border-radius: 0.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
    }

    .section-header button:hover {
      background: #1d4ed8;
    }

    .chat-list {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      max-height: 12rem;
      overflow-y: auto;
    }

    .chat-item {
      padding: 0.5rem;
      border-radius: 0.25rem;
      cursor: pointer;
      background: #374151;
      transition: background 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.75rem;
    }

    .chat-item:hover {
      background: #4b5563;
    }

    .chat-item.active {
      background: #2563eb;
    }

    .chat-info {
      flex: 1;
      min-width: 0;
    }

    .chat-title {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-date {
      color: #9ca3af;
      font-size: 0.7rem;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      padding: 0.25rem;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #ef4444;
    }

    .prompts-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .create-prompt {
      background: #374151;
      border-radius: 0.25rem;
      padding: 0.5rem;
      margin-bottom: 0.5rem;
      display: none;
      flex-direction: column;
      gap: 0.25rem;
    }

    .create-prompt.active {
      display: flex;
    }

    .create-prompt input,
    .create-prompt textarea {
      background: #1f2937;
      color: white;
      border: 1px solid #4b5563;
      padding: 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      font-family: inherit;
    }

    .create-prompt button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0.5rem;
      border-radius: 0.25rem;
      cursor: pointer;
      font-size: 0.75rem;
    }

    .create-prompt button:hover {
      background: #1d4ed8;
    }

    .prompts-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .prompt-item {
      background: #374151;
      padding: 0.5rem;
      border-radius: 0.25rem;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.75rem;
    }

    .prompt-checkbox {
      width: 1rem;
      height: 1rem;
      cursor: pointer;
      margin-top: 0.125rem;
      flex-shrink: 0;
    }

    .prompt-info {
      flex: 1;
      min-width: 0;
    }

    .prompt-title {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .prompt-content {
      color: #9ca3af;
      font-size: 0.7rem;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .sidebar-actions {
      border-top: 1px solid #374151;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .sidebar-actions button,
    .sidebar-actions label {
      background: #374151;
      color: white;
      border: none;
      padding: 0.5rem;
      border-radius: 0.25rem;
      cursor: pointer;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .sidebar-actions button:hover,
    .sidebar-actions label:hover {
      background: #4b5563;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .header {
      border-bottom: 1px solid #374151;
      background: #1f2937;
      padding: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      sticky: 0;
      z-index: 20;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .menu-btn {
      display: none;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      padding: 0.5rem;
    }

    .menu-btn:hover {
      background: #374151;
      border-radius: 0.25rem;
    }

    .header h1 {
      font-size: 1.125rem;
      font-weight: 700;
    }

    .header select {
      background: #374151;
      color: white;
      border: 1px solid #4b5563;
      padding: 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.875rem;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding-bottom: 1rem;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #6b7280;
      text-align: center;
    }

    .message {
      display: flex;
      gap: 0.5rem;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-content {
      max-width: 20rem;
      padding: 0.75rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .message.assistant .message-content {
      background: #374151;
      color: #d1d5db;
    }

    .message.user .message-content {
      background: #2563eb;
      color: white;
    }

    .message-actions {
      display: flex;
      gap: 0.25rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }

    .message-btn {
      background: #4b5563;
      color: white;
      border: none;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      cursor: pointer;
      font-size: 0.7rem;
    }

    .message-btn:hover {
      background: #6b7280;
    }

    .message-btn.delete:hover {
      background: #dc2626;
    }

    .edit-form {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .edit-form textarea {
      background: #1f2937;
      color: white;
      border: 1px solid #374151;
      padding: 0.5rem;
      border-radius: 0.25rem;
      font-family: inherit;
      font-size: 0.875rem;
      resize: vertical;
      min-height: 3rem;
    }

    .edit-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .edit-buttons button {
      flex: 1;
      padding: 0.5rem;
      border: none;
      border-radius: 0.25rem;
      cursor: pointer;
      font-size: 0.75rem;
      color: white;
    }

    .edit-buttons .save {
      background: #16a34a;
    }

    .edit-buttons .save:hover {
      background: #15803d;
    }

    .edit-buttons .cancel {
      background: #4b5563;
    }

    .edit-buttons .cancel:hover {
      background: #6b7280;
    }

    .input-area {
      border-top: 1px solid #374151;
      background: #1f2937;
      padding: 0.75rem;
      sticky: bottom;
      z-index: 10;
    }

    .input-form {
      display: flex;
      gap: 0.5rem;
    }

    .input-form input {
      flex: 1;
      background: #374151;
      color: white;
      border: 1px solid #4b5563;
      padding: 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.875rem;
      font-family: inherit;
    }

    .input-form input:focus {
      outline: none;
      border-color: #2563eb;
    }

    .input-form input:disabled {
      opacity: 0.5;
    }

    .input-form button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.25rem;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .input-form button:hover:not(:disabled) {
      background: #1d4ed8;
    }

    .input-form button:disabled {
      opacity: 0.5;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        width: 16rem;
        height: 100vh;
        transform: translateX(-100%);
        transition: transform 0.3s;
        z-index: 40;
      }

      .sidebar.active {
        transform: translateX(0);
      }

      .close-sidebar {
        display: block;
      }

      .menu-btn {
        display: block;
      }

      .message-content {
        max-width: 15rem;
      }

      .chat-list {
        max-height: 8rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Chats & Prompts</h2>
        <button class="close-sidebar" id="closeSidebar">✕</button>
      </div>

      <div class="sidebar-content">
        <!-- Chats Section -->
        <div class="section">
          <div class="section-header">
            <span>Chats</span>
            <button id="newChatBtn">+</button>
          </div>
          <div class="chat-list" id="chatList"></div>
        </div>

        <!-- Prompts Section -->
        <div class="section flex-grow prompts-section">
          <div class="section-header">
            <span>Prompts</span>
            <button id="togglePromptForm">+</button>
          </div>

          <div class="create-prompt" id="createPromptForm">
            <input type="text" id="promptTitle" placeholder="Title">
            <textarea id="promptContent" placeholder="Content"></textarea>
            <button id="addPromptBtn">Add</button>
          </div>

          <div class="prompts-list" id="promptsList"></div>
        </div>
      </div>

      <div class="sidebar-actions">
        <button id="exportBtn" style="display: none;">📥 Export</button>
        <label>
          📤 Import
          <input type="file" accept=".json" id="importBtn" style="display: none;">
        </label>
      </div>
    </div>

    <div class="main-content">
      <div class="header">
        <div class="header-left">
          <button class="menu-btn" id="menuBtn">☰</button>
          <h1>AI Chat</h1>
        </div>
        <select id="modelSelect">
          <option value="gpt-4o">gpt-4o</option>
          <option value="gpt-4o-mini">gpt-4o-mini</option>
          <option value="o3-mini">o3-mini</option>
          <option value="o1-mini">o1-mini</option>
          <option value="gpt-4.1">gpt-4.1</option>
          <option value="gpt-4.5-preview">gpt-4.5-preview</option>
        </select>
      </div>

      <div class="messages" id="messages">
        <div class="empty-state">Start a conversation</div>
      </div>

      <div class="input-area">
        <form class="input-form" id="inputForm">
          <input type="text" id="messageInput" placeholder="Message..." autocomplete="off">
          <button type="submit" id="sendBtn">Send</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // State
    let chats = [];
    let currentChatId = null;
    let prompts = [];
    let selectedPromptIds = new Set();

    // DOM Elements
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const menuBtn = document.getElementById('menuBtn');
    const closeSidebar = document.getElementById('closeSidebar');
    const newChatBtn = document.getElementById('newChatBtn');
    const chatList = document.getElementById('chatList');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const messagesDiv = document.getElementById('messages');
    const modelSelect = document.getElementById('modelSelect');
    const togglePromptForm = document.getElementById('togglePromptForm');
    const createPromptForm = document.getElementById('createPromptForm');
    const promptTitle = document.getElementById('promptTitle');
    const promptContent = document.getElementById('promptContent');
    const addPromptBtn = document.getElementById('addPromptBtn');
    const promptsList = document.getElementById('promptsList');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const inputForm = document.getElementById('inputForm');

    // Load data from localStorage
    function loadData() {
      const savedChats = localStorage.getItem('chats');
      const savedPrompts = localStorage.getItem('prompts');
      if (savedChats) chats = JSON.parse(savedChats);
      if (savedPrompts) prompts = JSON.parse(savedPrompts);
    }

    // Save data to localStorage
    function saveChats() {
      localStorage.setItem('chats', JSON.stringify(chats));
    }

    function savePrompts() {
      localStorage.setItem('prompts', JSON.stringify(prompts));
    }

    // Toggle sidebar on mobile
    function toggleSidebar() {
      sidebar.classList.toggle('active');
      sidebarOverlay.classList.toggle('active');
    }

    menuBtn.addEventListener('click', toggleSidebar);
    closeSidebar.addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', toggleSidebar);

    // Create new chat
    function createNewChat() {
      const newChat = {
        id: Date.now(),
        title: `Chat ${new Date().toLocaleDateString()}`,
        messages: [],
        createdAt: new Date().toISOString(),
      };
      chats.unshift(newChat);
      selectChat(newChat.id);
      saveChats();
      renderChats();
    }

    // Select chat
    function selectChat(chatId) {
      currentChatId = chatId;
      renderChats();
      renderMessages();
      toggleSidebar();
    }

    // Delete chat
    function deleteChat(chatId) {
      chats = chats.filter(c => c.id !== chatId);
      if (currentChatId === chatId) {
        currentChatId = null;
        messagesDiv.innerHTML = '<div class="empty-state">Start a conversation</div>';
      }
      saveChats();
      renderChats();
    }

    // Render chats
    function renderChats() {
      chatList.innerHTML = chats.map(chat => `
        <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" onclick="selectChat(${chat.id})">
          <div class="chat-info">
            <div class="chat-title">${chat.title}</div>
            <div class="chat-date">${new Date(chat.createdAt).toLocaleDateString()}</div>
          </div>
          <button class="delete-btn" onclick="event.stopPropagation(); deleteChat(${chat.id})">✕</button>
        </div>
      `).join('');
    }

    // Add prompt
    function addPrompt() {
      if (promptTitle.value.trim() && promptContent.value.trim()) {
        const prompt = {
          id: Date.now(),
          title: promptTitle.value,
          content: promptContent.value,
        };
        prompts.unshift(prompt);
        promptTitle.value = '';
        promptContent.value = '';
        savePrompts();
        renderPrompts();
      }
    }

    // Delete prompt
    function deletePrompt(promptId) {
      prompts = prompts.filter(p => p.id !== promptId);
      selectedPromptIds.delete(promptId);
      savePrompts();
      renderPrompts();
    }

    // Toggle prompt selection
    function togglePrompt(promptId) {
      if (selectedPromptIds.has(promptId)) {
        selectedPromptIds.delete(promptId);
      } else {
        selectedPromptIds.add(promptId);
      }
      renderPrompts();
    }

    // Render prompts
    function renderPrompts() {
      promptsList.innerHTML = prompts.map(p => `
        <div class="prompt-item">
          <input 
            type="checkbox" 
            class="prompt-checkbox"
            ${selectedPromptIds.has(p.id) ? 'checked' : ''}
            onchange="togglePrompt(${p.id})"
          >
          <div class="prompt-info">
            <div class="prompt-title">${p.title}</div>
            <div class="prompt-content">${p.content}</div>
          </div>
          <button class="delete-btn" onclick="deletePrompt(${p.id})">✕</button>
        </div>
      `).join('');
    }

    // Send message
    async function sendMessage(e) {
      e.preventDefault();
      if (!currentChatId || !messageInput.value.trim()) return;

      let finalMessage = messageInput.value;
      
      // Add selected prompts
      if (selectedPromptIds.size > 0) {
        const selectedPromptTexts = Array.from(selectedPromptIds)
          .map(id => prompts.find(p => p.id === id)?.content)
          .filter(Boolean)
          .join('\n\n');
        if (selectedPromptTexts) {
          finalMessage = selectedPromptTexts + '\n\n' + finalMessage;
        }
      }

      const chat = chats.find(c => c.id === currentChatId);
      if (!chat) return;

      const userMessage = {
        id: Date.now(),
        role: 'user',
        content: finalMessage,
      };

      chat.messages.push(userMessage);
      messageInput.value = '';
      sendBtn.disabled = true;
      renderMessages();
      saveChats();

      try {
        if (typeof window.puter !== 'undefined') {
          const response = await window.puter.ai.chat(finalMessage, { model: modelSelect.value });
          
          const aiMessage = {
            id: Date.now() + 1,
            role: 'assistant',
            content: response,
          };

          chat.messages.push(aiMessage);
          chat.title = finalMessage.slice(0, 50) || 'New Chat';
          saveChats();
          renderMessages();
          renderChats();
        } else {
          alert('Puter.js not loaded');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error: ' + error.message);
      } finally {
        sendBtn.disabled = false;
      }
    }

    // Delete message
    function editMessage(messageId, newContent) {
      const chat = chats.find(c => c.id === currentChatId);
      if (!chat) return;
      
      const message = chat.messages.find(m => m.id === messageId);
      if (message) {
        message.content = newContent;
        saveChats();
        renderMessages();
      }
    }

    // Delete message
    function deleteMessage(messageId) {
      const chat = chats.find(c => c.id === currentChatId);
      if (!chat) return;
      
      chat.messages = chat.messages.filter(m => m.id !== messageId);
      saveChats();
      renderMessages();
    }

    // Regenerate message
    async function regenerateMessage(messageId) {
      const chat = chats.find(c => c.id === currentChatId);
      if (!chat) return;

      const messageIndex = chat.messages.findIndex(m => m.id === messageId);
      if (messageIndex <= 0) return;

      const userMessage = chat.messages[messageIndex - 1];
      chat.messages = chat.messages.slice(0, messageIndex);
      renderMessages();
      saveChats();

      sendBtn.disabled = true;

      try {
        if (typeof window.puter !== 'undefined') {
          const response = await window.puter.ai.chat(userMessage.content, { model: modelSelect.value });
          
          const aiMessage = {
            id: Date.now(),
            role: 'assistant',
            content: response,
          };

          chat.messages.push(aiMessage);
          saveChats();
          renderMessages();
        }
      } catch (error) {
        console.error('Error:', error);
      } finally {
        sendBtn.disabled = false;
      }
    }

    // Render messages
    function renderMessages() {
      const chat = chats.find(c => c.id === currentChatId);
      if (!chat) {
        messagesDiv.innerHTML = '<div class="empty-state">Start a conversation</div>';
        return;
      }

      if (chat.messages.length === 0) {
        messagesDiv.innerHTML = '<div class="empty-state">Start a conversation</div>';
        return;
      }

      messagesDiv.innerHTML = chat.messages.map((msg, idx) => {
        const content = String(msg.content || '').replace(/'/g, "\\'").replace(/"/g, '\\"');
        return `
          <div class="message ${msg.role}">
            <div class="message-content">
              ${msg.content}
              <div class="message-actions">
                <button class="message-btn" onclick="copyToClipboard('${content}')">Copy</button>
                <button class="message-btn" onclick="editMsg(${msg.id})">Edit</button>
                ${msg.role === 'assistant' ? `<button class="message-btn" onclick="regenerateMessage(${msg.id})">Regenerate</button>` : ''}
                <button class="message-btn delete" onclick="deleteMessage(${msg.id})">Delete</button>
              </div>
            </div>
          </div>
        `;
      }).join('');

      // Scroll to bottom
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Copy to clipboard helper
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text);
    }

    // Edit message helper
    function editMsg(messageId) {
      const chat = chats.find(c => c.id === currentChatId);
      if (!chat) return;
      const message = chat.messages.find(m => m.id === messageId);
      if (!message) return;
      
      const newContent = prompt('Edit message:', message.content);
      if (newContent) {
        editMessage(messageId, newContent);
      }
    }

    // Export chat
    function exportChat() {
      const chat = chats.find(c => c.id === currentChatId);
      if (!chat) return;

      const dataStr = JSON.stringify(chat, null, 2);
      const dataBlob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(dataBlob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `chat-${Date.now()}.json`;
      link.click();
    }

    // Import chat
    function importChat(e) {
      const file = e.target.files?.[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const importedChat = JSON.parse(event.target.result);
          importedChat.id = Date.now();
          chats.unshift(importedChat);
          saveChats();
          renderChats();
        } catch (error) {
          alert('Error importing chat');
        }
      };
      reader.readAsText(file);
    }

    // Event listeners
    newChatBtn.addEventListener('click', createNewChat);
    inputForm.addEventListener('submit', sendMessage);
    togglePromptForm.addEventListener('click', () => createPromptForm.classList.toggle('active'));
    addPromptBtn.addEventListener('click', addPrompt);
    exportBtn.addEventListener('click', exportChat);
    importBtn.addEventListener('change', importChat);

    // Update export button visibility
    setInterval(() => {
      exportBtn.style.display = currentChatId ? 'flex' : 'none';
    }, 100);

    // Initialize
    loadData();
    renderChats();
    renderPrompts();
  </script>
</body>
</html>
